<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CP_Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <main class="container">
    <div class="header">
      <h1>Weakness Radar</h1>
      <p class="subtitle">Visualize your algorithmic strengths across Codeforces & LeetCode</p>
    </div>

    <div class="glass-panel search-panel">
      <form id="searchForm" class="search-form">
        <div class="input-grid">
          <div class="input-group">
            <label for="cfHandle">Codeforces Handle</label>
            <input type="text" id="cfHandle" class="input-field" placeholder="e.g. tourist">
          </div>
          <div class="input-group">
            <label for="lcHandle">LeetCode Handle</label>
            <input type="text" id="lcHandle" class="input-field" placeholder="e.g. neetcode">
          </div>
        </div>
        <button type="submit" class="btn-primary" id="submitBtn">Analyze Profile</button>
      </form>
      <div id="errorBox" class="error-box hidden"></div>
    </div>

    <!-- New Profile Stats Section -->
    <div id="profileStats" class="profile-stats hidden">
      <div class="stat-card codeforces-card">
        <div class="card-header">
          <h3 id="cfDisplayHandle">Codeforces</h3>
          <span class="rank-badge" id="cfRank">Rank</span>
        </div>
        <div class="card-metrics">
          <div class="metric"><span>Rating</span><strong id="cfRating">N/A</strong></div>
          <div class="metric"><span>Total Solved</span><strong id="cfSolved">0</strong></div>
        </div>
      </div>
      <div class="stat-card leetcode-card">
        <div class="card-header">
          <h3 id="lcDisplayHandle">LeetCode</h3>
        </div>
        <div class="card-metrics">
          <div class="metric"><span>Contest Rating</span><strong id="lcRating">N/A</strong></div>
          <div class="metric"><span>Total Solved</span><strong id="lcSolved">0</strong></div>
        </div>
      </div>
    </div>

    <div id="dashboardGrid" class="dashboard-grid hidden">
      <div class="glass-panel chart-panel">
        <h2>Algorithmic Distribution</h2>
        <div class="chart-container">
          <canvas id="radarChart"></canvas>
        </div>
      </div>

      <div class="glass-panel list-panel">
        <h2>Top Strengths</h2>
        <div id="strengthsList" class="list-container"></div>
      </div>

      <div class="glass-panel list-panel">
        <h2>Weak Topics to Improve</h2>
        <div id="weaknessesList" class="list-container"></div>
      </div>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
